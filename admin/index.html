<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能客服 - 管理後台</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }

        .sidebar-item.active {
            background-color: #eff6ff;
            color: #2563eb;
            border-right: 4px solid #2563eb;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid #e2e8f0;
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>

<body class="bg-gray-50 flex h-screen overflow-hidden">

    <!-- Sidebar Navigation -->
    <aside class="w-64 bg-white border-r border-gray-200 flex flex-col pt-8">
        <div class="px-6 mb-10 flex items-center space-x-3">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                <i data-lucide="layout-dashboard" class="text-white w-5 h-5"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight">AI 智能中台</h1>
        </div>

        <nav class="flex-1 space-y-1">
            <button onclick="showSection('dashboard')" data-nav="dashboard"
                class="sidebar-item active w-full flex items-center space-x-3 px-6 py-4 text-sm font-medium text-gray-500 hover:bg-gray-50 hover:text-gray-700 transition-all">
                <i data-lucide="home" class="w-5 h-5"></i>
                <span>數據總覽</span>
            </button>
            <button onclick="showSection('faq')" data-nav="faq"
                class="sidebar-item w-full flex items-center space-x-3 px-6 py-4 text-sm font-medium text-gray-500 hover:bg-gray-50 hover:text-gray-700 transition-all">
                <i data-lucide="help-circle" class="w-5 h-5"></i>
                <span>FAQ 管理</span>
            </button>
            <button onclick="showSection('conversations')" data-nav="conversations"
                class="sidebar-item w-full flex items-center space-x-3 px-6 py-4 text-sm font-medium text-gray-500 hover:bg-gray-50 hover:text-gray-700 transition-all">
                <i data-lucide="message-circle" class="w-5 h-5"></i>
                <span>對話追蹤</span>
            </button>
            <button onclick="showSection('tickets')" data-nav="tickets"
                class="sidebar-item w-full flex items-center space-x-3 px-6 py-4 text-sm font-medium text-gray-500 hover:bg-gray-50 hover:text-gray-700 transition-all">
                <i data-lucide="ticket" class="w-5 h-5"></i>
                <span>工單中心</span>
                <span id="badge-tickets"
                    class="hidden ml-auto bg-red-100 text-red-600 px-2 py-0.5 rounded-full text-[10px]">0</span>
            </button>
            <button onclick="showSection('settings')" data-nav="settings"
                class="sidebar-item w-full flex items-center space-x-3 px-6 py-4 text-sm font-medium text-gray-500 hover:bg-gray-50 hover:text-gray-700 transition-all">
                <i data-lucide="settings" class="w-5 h-5"></i>
                <span>系統設定</span>
            </button>
        </nav>

        <div class="p-6 border-t border-gray-100">
            <div class="flex items-center space-x-3">
                <div class="w-8 h-8 rounded-full bg-slate-200"></div>
                <div class="text-xs">
                    <p class="font-bold">超級管理員</p>
                    <p class="text-gray-400">admin@system</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <!-- Top Header -->
        <header class="h-16 bg-white border-b border-gray-200 px-10 flex items-center justify-between">
            <h2 id="section-title" class="text-xl font-bold text-gray-800 uppercase tracking-wide">數據總覽</h2>
            <div class="flex items-center space-x-4">
                <div class="flex items-center space-x-2 text-sm text-green-500 font-medium">
                    <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                    <span>GAS 服務正常</span>
                </div>
                <button onclick="location.reload()" class="p-2 text-gray-400 hover:text-blue-600">
                    <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                </button>
            </div>
        </header>

        <!-- Content Scroller -->
        <div id="content-container" class="flex-1 overflow-y-auto p-10 scrollbar-hide">

            <!-- 1. Dashboard Section -->
            <section id="section-dashboard" class="section active space-y-8">
                <div class="grid grid-cols-4 gap-6">
                    <div class="glass-card p-6 rounded-3xl">
                        <p class="text-sm font-medium text-gray-500 mb-1">累計用戶數</p>
                        <h3 id="stat-users" class="text-3xl font-bold text-gray-800">0</h3>
                    </div>
                    <div class="glass-card p-6 rounded-3xl">
                        <p class="text-sm font-medium text-gray-500 mb-1">今日對話次數</p>
                        <h3 id="stat-conversations" class="text-3xl font-bold text-gray-800">0</h3>
                    </div>
                    <div class="glass-card p-6 rounded-3xl border-l-4 border-blue-500">
                        <p class="text-sm font-medium text-gray-500 mb-1">FAQ 解決率</p>
                        <h3 id="stat-hitrate" class="text-3xl font-bold text-blue-600">0%</h3>
                    </div>
                    <div class="glass-card p-6 rounded-3xl border-l-4 border-orange-500">
                        <p class="text-sm font-medium text-gray-500 mb-1">待處理工單</p>
                        <h3 id="stat-tickets" class="text-3xl font-bold text-orange-600">0</h3>
                    </div>
                </div>

                <div class="glass-card rounded-3xl p-8">
                    <h4 class="font-bold text-gray-800 mb-6 flex items-center">
                        <i data-lucide="bar-chart-2" class="w-5 h-5 mr-2 text-blue-600"></i>
                        熱門 FAQ 解決統計
                    </h4>
                    <div id="top-faq-list" class="space-y-4">
                        <p class="text-gray-400 text-sm italic">載入統計資料中...</p>
                    </div>
                </div>
            </section>

            <!-- 2. FAQ Management Section -->
            <section id="section-faq" class="section space-y-6">
                <div class="flex items-center justify-between">
                    <div class="flex items-center space-x-4">
                        <div class="relative">
                            <input id="faq-search" type="text" placeholder="搜尋問題..."
                                class="bg-white border border-gray-200 rounded-xl pl-10 pr-4 py-2 text-sm w-64 focus:ring-2 focus:ring-blue-500 outline-none">
                            <i data-lucide="search" class="absolute left-3 top-2.5 w-4 h-4 text-gray-400"></i>
                        </div>
                    </div>
                    <button onclick="openFaqModal()"
                        class="bg-blue-600 text-white px-6 py-2.5 rounded-xl font-bold text-sm shadow-lg shadow-blue-100 hover:bg-blue-700 transition-all flex items-center space-x-2">
                        <i data-lucide="plus" class="w-4 h-4"></i>
                        <span>新增 FAQ</span>
                    </button>
                </div>

                <div class="glass-card rounded-3xl overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50/50 border-b border-gray-100">
                            <tr>
                                <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase">分類</th>
                                <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase">問題/關鍵字</th>
                                <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase">解答</th>
                                <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase">優先級</th>
                                <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase">狀態</th>
                                <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase">操作</th>
                            </tr>
                        </thead>
                        <tbody id="faq-table-body" class="divide-y divide-gray-50">
                            <!-- Table rows dynamic -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- 3. Conversations Tracking Section -->
            <section id="section-conversations" class="section space-y-6">
                <div class="grid grid-cols-12 gap-6 h-[70vh]">
                    <!-- User List -->
                    <div class="col-span-4 glass-card rounded-3xl overflow-hidden flex flex-col">
                        <div class="p-4 border-b border-gray-100">
                            <h4 class="font-bold text-gray-800 text-sm">會話列表</h4>
                        </div>
                        <div id="user-msg-list" class="flex-1 overflow-y-auto divide-y divide-gray-50">
                            <!-- Dynamic list -->
                        </div>
                    </div>
                    <!-- Chat Viewer -->
                    <div class="col-span-8 glass-card rounded-3xl overflow-hidden flex flex-col">
                        <div id="chat-viewer-header"
                            class="p-4 border-b border-gray-100 flex items-center justify-between">
                            <div class="flex items-center space-x-3">
                                <div id="viewer-avatar" class="w-8 h-8 rounded-full bg-gray-100"></div>
                                <h4 id="viewer-name" class="font-bold text-gray-800 text-sm">請選擇對話</h4>
                            </div>
                            <span id="viewer-id" class="text-[10px] text-gray-400"></span>
                        </div>
                        <div id="chat-viewer-body" class="flex-1 overflow-y-auto p-6 space-y-4 bg-slate-50/30">
                            <p class="text-gray-400 text-center py-20 text-sm">點擊左側列表查看對話細節</p>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 4. Tickets Management Section -->
            <section id="section-tickets" class="section space-y-6">
                <div class="grid grid-cols-1 gap-4" id="ticket-list">
                    <!-- Dynamic Ticket Cards -->
                </div>
            </section>

            <!-- 5. System Settings Section -->
            <section id="section-settings" class="section space-y-10">
                <div class="max-w-3xl space-y-8">
                    <!-- General Settings -->
                    <div class="space-y-4">
                        <h4 class="font-bold text-gray-800 pb-2 border-b border-gray-100">核心金鑰</h4>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Gemini API
                                    Key</label>
                                <input id="set-gemini-key" type="password" placeholder="AIzaSy..."
                                    class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase mb-2">LINE Access
                                    Token</label>
                                <textarea id="set-line-token" rows="3"
                                    class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
                            </div>
                        </div>
                    </div>

                    <!-- Bot Prompts -->
                    <div class="space-y-4">
                        <h4 class="font-bold text-gray-800 pb-2 border-b border-gray-100">AI 客服人設 (System Prompt)</h4>
                        <textarea id="set-prompt" rows="8"
                            class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none leading-relaxed"></textarea>
                    </div>

                    <div class="flex justify-end pt-4">
                        <button onclick="saveAllSettings()"
                            class="bg-blue-600 text-white px-10 py-3 rounded-xl font-bold shadow-lg shadow-blue-100 hover:bg-blue-700 transition-all">儲存所有設定</button>
                    </div>
                </div>
            </section>

        </div>
    </main>

    <!-- FAQ Modal (CRUD) -->
    <div id="faq-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-6">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="closeFaqModal()"></div>
        <div class="relative bg-white w-full max-w-xl rounded-3xl shadow-2xl overflow-hidden flex flex-col">
            <div class="p-6 border-b border-gray-100 flex items-center justify-between">
                <h4 id="faq-modal-title" class="font-bold text-gray-800">編輯 FAQ</h4>
                <button onclick="closeFaqModal()" class="text-gray-400 hover:text-red-500">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="p-8 space-y-5 overflow-y-auto">
                <input type="hidden" id="modal-faq-id">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-2">分類</label>
                        <select id="modal-faq-category"
                            class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm">
                            <option value="basic">基礎資訊</option>
                            <option value="order">訂單問題</option>
                            <option value="refund">退款申訴</option>
                            <option value="reservation">預約諮詢</option>
                            <option value="other">其他</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-2">優先級</label>
                        <input id="modal-faq-priority" type="number" value="10"
                            class="w-full border border-gray-200 rounded-xl px-4 py-2 text-sm">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-2">問題內容</label>
                    <input id="modal-faq-question" type="text"
                        class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-2">關鍵字 (逗號隔開)</label>
                    <input id="modal-faq-keywords" type="text" placeholder="如: 營業,時間,幾點"
                        class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-2">標準答覆</label>
                    <textarea id="modal-faq-answer" rows="5"
                        class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm"></textarea>
                </div>
            </div>
            <div class="p-6 bg-gray-50 border-t border-gray-100 flex justify-end space-x-3">
                <button onclick="closeFaqModal()" class="px-6 py-2.5 text-sm font-medium text-gray-500">取消</button>
                <button onclick="saveFaq()"
                    class="bg-blue-600 text-white px-8 py-2.5 rounded-xl font-bold text-sm shadow-md hover:bg-blue-700 transition-all">確認儲存</button>
            </div>
        </div>
    </div>

    <!-- Global Scripts -->
    <script src="script.js"></script>
</body>

</html>

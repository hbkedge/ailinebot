<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI 智能客服 - LIFF</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- LIFF SDK -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');

    body {
      font-family: 'Noto+Sans+TC', sans-serif;
      background-color: #f8fafc;
      color: #1e293b;
    }

    .page {
      display: none !important;
      min-height: 100vh;
    }

    .page.active {
      display: block !important;
    }

    .page.active.chat-layout {
      display: flex !important;
    }

    .hidden {
      display: none !important;
    }

    .glass {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .chat-bubble {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 18px;
      margin-bottom: 8px;
      position: relative;
    }

    .chat-user {
      background-color: #3b82f6;
      color: white;
      border-bottom-right-radius: 4px;
      align-self: flex-end;
    }

    .chat-bot {
      background-color: white;
      color: #1e293b;
      border-bottom-left-radius: 4px;
      align-self: flex-start;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
    }

    .loading-dots span {
      animation: blink 1.4s infinite both;
      height: 6px;
      width: 6px;
      background-color: #94a3b8;
      border-radius: 50%;
      display: inline-block;
      margin: 0 2px;
    }

    .loading-dots span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .loading-dots span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes blink {
      0% {
        opacity: 0.2;
      }

      20% {
        opacity: 1;
      }

      100% {
        opacity: 0.2;
      }
    }

    .bottom-nav-active {
      color: #3b82f6;
    }
  </style>
</head>

<body class="bg-slate-50">

  <!-- 1. Splash / Loading Page -->
  <div id="page-loading" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center">
    <div class="animate-bounce mb-4">
      <div class="w-20 h-20 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg">
        <i data-lucide="bot" class="text-white w-12 h-12"></i>
      </div>
    </div>
    <h1 class="text-xl font-bold text-slate-800">AI 智能客服</h1>
    <p class="text-slate-400 mt-2 text-sm">系統初始化中...</p>
  </div>

  <!-- 2. Home Page -->
  <div id="page-home" class="page pb-20">
    <header class="p-6 bg-white shadow-sm sticky top-0 z-10 flex items-center justify-between">
      <div class="flex items-center space-x-3">
        <div id="user-avatar" class="w-10 h-10 rounded-full bg-slate-200 overflow-hidden"></div>
        <div>
          <p class="text-xs text-slate-500">哈囉，</p>
          <p id="user-name" class="font-bold text-slate-800">載入中...</p>
        </div>
      </div>
      <button onclick="showPage('page-profile')" class="p-2 text-slate-400">
        <i data-lucide="settings" class="w-6 h-6"></i>
      </button>
    </header>

    <main class="p-4 space-y-6">
      <!-- Summary Card -->
      <div class="bg-gradient-to-br from-blue-600 to-indigo-700 p-6 rounded-3xl text-white shadow-xl">
        <h2 class="text-lg font-medium opacity-90">需要什麼協助嗎？</h2>
        <p class="text-sm opacity-75 mt-1">AI 小助手隨時為您服務</p>
        <div class="mt-6 flex space-x-4">
          <button onclick="showPage('page-chat')"
            class="flex-1 bg-white text-blue-600 py-3 rounded-xl font-bold text-sm shadow-sm hover:bg-slate-50 transition-all flex items-center justify-center space-x-2">
            <i data-lucide="message-square" class="w-4 h-4"></i>
            <span>立即對話</span>
          </button>
          <button onclick="showPage('page-faq')"
            class="flex-1 bg-blue-500/30 text-white border border-white/20 py-3 rounded-xl font-bold text-sm backdrop-blur-sm hover:bg-blue-500/40 transition-all flex items-center justify-center space-x-2">
            <i data-lucide="help-circle" class="w-4 h-4"></i>
            <span>常見問題</span>
          </button>
        </div>
      </div>

      <!-- Quick Actions -->
      <div class="grid grid-cols-2 gap-4">
        <button onclick="showPage('page-contact')"
          class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex flex-col items-center justify-center space-y-2">
          <div class="w-10 h-10 bg-orange-100 text-orange-600 rounded-full flex items-center justify-center">
            <i data-lucide="headset" class="w-5 h-5"></i>
          </div>
          <span class="text-sm font-medium text-slate-700">專人服務</span>
        </button>
        <div
          class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex flex-col items-center justify-center space-y-2 opacity-50">
          <div class="w-10 h-10 bg-green-100 text-green-600 rounded-full flex items-center justify-center">
            <i data-lucide="calendar" class="w-5 h-5"></i>
          </div>
          <span class="text-sm font-medium text-slate-700">預約查詢</span>
        </div>
      </div>

      <!-- News/Recent -->
      <section>
        <h3 class="font-bold text-slate-800 mb-3 px-1">熱門問題</h3>
        <div class="space-y-3" id="home-faq-list">
          <!-- Dynamic FAQs -->
          <p class="text-slate-400 text-sm italic px-2">載入常見問題中...</p>
        </div>
      </section>
    </main>
  </div>

  <!-- 3. Chat Page -->
  <div id="page-chat" class="page bg-slate-100 pb-20 chat-layout flex-col h-screen">
    <header class="p-4 bg-white shadow-sm flex items-center space-x-3">
      <button onclick="showPage('page-home')" class="p-2 -ml-2">
        <i data-lucide="chevron-left" class="w-6 h-6"></i>
      </button>
      <div class="flex-1">
        <h2 class="font-bold text-slate-800">智能小助手</h2>
        <div class="flex items-center text-[10px] text-green-500">
          <span class="w-1.5 h-1.5 rounded-full bg-green-500 mr-1 animate-pulse"></span>
          AI 在線上
        </div>
      </div>
      <button id="btn-handoff"
        class="text-xs bg-slate-100 px-3 py-1.5 rounded-lg text-slate-600 font-medium">轉人工</button>
    </header>

    <div id="chat-messages" class="flex-1 overflow-y-auto p-4 flex flex-col">
      <div class="chat-bubble chat-bot">
        您好！我是您的 AI 小助手，請問有什麼可以幫您的嗎？
      </div>
    </div>

    <div id="chat-loading" class="px-4 py-2 hidden">
      <div class="chat-bubble chat-bot py-3">
        <div class="loading-dots">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>

    <div class="p-3 bg-white border-t flex items-center space-x-2 sticky bottom-0">
      <input id="chat-input" type="text" placeholder="輸入訊息..."
        class="flex-1 bg-slate-50 border border-slate-200 rounded-2xl px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      <button id="chat-send"
        class="w-10 h-10 bg-blue-600 text-white rounded-full flex items-center justify-center shadow-md shadow-blue-100 hover:bg-blue-700 active:scale-95 transition-all">
        <i data-lucide="send" class="w-5 h-5 ml-0.5"></i>
      </button>
    </div>
  </div>

  <!-- 4. FAQ Page -->
  <div id="page-faq" class="page pb-20">
    <header class="p-6 bg-white shadow-sm flex items-center space-x-3 sticky top-0 z-10">
      <button onclick="showPage('page-home')" class="p-2 -ml-2">
        <i data-lucide="chevron-left" class="w-6 h-6"></i>
      </button>
      <h2 class="text-lg font-bold text-slate-800">常見問題</h2>
    </header>

    <div class="p-4">
      <div class="relative mb-6">
        <input id="faq-search" type="text" placeholder="搜尋問題..."
          class="w-full bg-white border border-slate-200 rounded-2xl pl-10 pr-4 py-3 text-sm shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        <i data-lucide="search" class="absolute left-3 top-3.5 w-4 h-4 text-slate-400"></i>
      </div>

      <div id="faq-list" class="space-y-4">
        <!-- FAQs inserted here -->
      </div>
    </div>
  </div>

  <!-- 5. Contact / Ticket Page -->
  <div id="page-contact" class="page pb-20">
    <header class="p-6 bg-white shadow-sm flex items-center space-x-3 sticky top-0 z-10">
      <button onclick="showPage('page-home')" class="p-2 -ml-2">
        <i data-lucide="chevron-left" class="w-6 h-6"></i>
      </button>
      <h2 class="text-lg font-bold text-slate-800">聯絡專人</h2>
    </header>

    <div class="p-6">
      <div class="bg-blue-50 border border-blue-100 p-4 rounded-xl mb-6">
        <div class="flex items-start space-x-3">
          <i data-lucide="info" class="w-5 h-5 text-blue-500 mt-0.5"></i>
          <p class="text-xs text-blue-700 leading-relaxed">
            目前非營業時間或客服人員正忙碌中，您可以先行留下您的問題，我們將在一個工作日內回應您。
          </p>
        </div>
      </div>

      <form id="contact-form" class="space-y-4">
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">問題類型</label>
          <select id="ticket-category"
            class="w-full bg-white border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="support">售後問題</option>
            <option value="reservation">預約諮詢</option>
            <option value="refund">退款申訴</option>
            <option value="complaint">服務抱怨</option>
            <option value="other">其他</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">問題描述</label>
          <textarea id="ticket-summary" rows="4" placeholder="請詳細描述您的問題..."
            class="w-full bg-white border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">聯絡電話</label>
          <input id="ticket-phone" type="tel" placeholder="09xx-xxx-xxx"
            class="w-full bg-white border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <button type="submit"
          class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold shadow-lg shadow-blue-100 hover:bg-blue-700 active:scale-95 transition-all mt-6">送出留言</button>
      </form>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav id="bottom-nav"
    class="fixed bottom-0 left-0 right-0 h-20 bg-white/80 backdrop-blur-md border-t border-slate-100 flex items-center justify-around px-2 z-20">
    <button onclick="showPage('page-home')" class="nav-item flex flex-col items-center space-y-1 transition-all"
      data-page="page-home">
      <i data-lucide="home" class="w-5 h-5"></i>
      <span class="text-[10px] font-medium">首頁</span>
    </button>
    <button onclick="showPage('page-chat')" class="nav-item flex flex-col items-center space-y-1 transition-all"
      data-page="page-chat">
      <i data-lucide="message-square" class="w-5 h-5"></i>
      <span class="text-[10px] font-medium">對話</span>
    </button>
    <button onclick="showPage('page-faq')" class="nav-item flex flex-col items-center space-y-1 transition-all"
      data-page="page-faq">
      <i data-lucide="search" class="w-5 h-5"></i>
      <span class="text-[10px] font-medium">搜尋</span>
    </button>
    <button onclick="showPage('page-contact')" class="nav-item flex flex-col items-center space-y-1 transition-all"
      data-page="page-contact">
      <i data-lucide="edit-3" class="w-5 h-5"></i>
      <span class="text-[10px] font-medium">留言</span>
    </button>
  </nav>

  <!-- Global Scripts -->
  <script src="script.js"></script>
</body>

</html>
